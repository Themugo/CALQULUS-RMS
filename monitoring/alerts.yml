# Alerting Rules for RentFlow
# Prometheus alerting rules for production monitoring

groups:
  - name: rentflow_alerts
    interval: 30s
    rules:
      # High error rate alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} for the last 5 minutes"

      # High response time alert
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s for the last 5 minutes"

      # Database connection pool exhaustion
      - alert: DatabaseConnectionPoolExhaustion
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool usage is {{ $value | humanizePercentage }}"

      # Payment callback failure rate
      - alert: PaymentCallbackFailureRate
        expr: rate(payment_callback_failures_total[5m]) / rate(payment_callbacks_total[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          team: payments
        annotations:
          summary: "High payment callback failure rate"
          description: "Payment callback failure rate is {{ $value | humanizePercentage }}"

      # Low active users
      - alert: LowActiveUsers
        expr: active_users_total < 10
        for: 15m
        labels:
          severity: info
          team: product
        annotations:
          summary: "Low active users"
          description: "Only {{ $value }} active users in the last 15 minutes"

      # Message delivery failure rate
      - alert: MessageDeliveryFailureRate
        expr: rate(message_delivery_failures_total[5m]) / rate(message_deliveries_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High message delivery failure rate"
          description: "Message delivery failure rate is {{ $value | humanizePercentage }}"

      # Rate limit exceeded
      - alert: RateLimitExceeded
        expr: rate(rate_limit_exceeded_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High rate limit violations"
          description: "Rate limit exceeded {{ $value }} times in the last 5 minutes"

      # Memory usage high
      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 / 1024 > 2
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}GB"

      # CPU usage high
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }}"

      # Disk space low
      - alert: LowDiskSpace
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.1
        for: 5m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Low disk space"
          description: "Disk space available is {{ $value | humanizePercentage }}"

  - name: financial_alerts
    interval: 1m
    rules:
      # Payment processing delay
      - alert: PaymentProcessingDelay
        expr: payment_processing_duration_seconds > 60
        for: 5m
        labels:
          severity: warning
          team: payments
        annotations:
          summary: "Payment processing delayed"
          description: "Payment processing taking longer than 60 seconds"

      # Duplicate payment attempts
      - alert: DuplicatePaymentAttempts
        expr: rate(duplicate_payment_attempts_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: payments
        annotations:
          summary: "High duplicate payment attempts"
          description: "{{ $value }} duplicate payment attempts in the last 5 minutes"

  - name: security_alerts
    interval: 30s
    rules:
      # Failed login attempts
      - alert: HighFailedLoginAttempts
        expr: rate(failed_login_attempts_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High failed login attempts"
          description: "{{ $value }} failed login attempts in the last 5 minutes"

      # MFA bypass attempts
      - alert: MFABypassAttempts
        expr: rate(mfa_bypass_attempts_total[5m]) > 5
        for: 5m
        labels:
          severity: critical
          team: security
        annotations:
          summary: "MFA bypass attempts detected"
          description: "{{ $value }} MFA bypass attempts in the last 5 minutes"
