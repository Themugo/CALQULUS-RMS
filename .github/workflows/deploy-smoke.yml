name: Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Production or staging URL to smoke test
        required: true
        type: string

jobs:
  smoke:
    name: Smoke deployed app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke test deployment
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
        run: npm run smoke:deploy
