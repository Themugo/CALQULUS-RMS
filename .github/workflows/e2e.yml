name: E2E

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

jobs:
  playwright:
    name: Playwright Chromium
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.E2E_SUPABASE_PUBLISHABLE_KEY || 'ci-placeholder-anon-key' }}
      VITE_ENABLE_PUBLIC_DEMO: "false"
      VITE_ENABLE_DEMO_SEED: "false"
      E2E_MANAGER_EMAIL: ${{ secrets.E2E_MANAGER_EMAIL }}
      E2E_MANAGER_PASSWORD: ${{ secrets.E2E_MANAGER_PASSWORD }}
      E2E_TENANT_EMAIL: ${{ secrets.E2E_TENANT_EMAIL }}
      E2E_TENANT_PASSWORD: ${{ secrets.E2E_TENANT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
