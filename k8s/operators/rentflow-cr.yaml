apiVersion: rentflow.io/v1alpha1
kind: RentFlow
metadata:
  name: rentflow-production
  namespace: rentflow
spec:
  replicas: 3
  image: rentflow:latest
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilization: 70
  environment:
    NODE_ENV: "production"
    LOG_LEVEL: "info"
