apiVersion: apps/v1
kind: Deployment
metadata:
  name: calqulusrms-green
  labels:
    app: calqulusrms
    version: green
spec:
  replicas: 3
  selector:
    matchLabels:
      app: calqulusrms
      version: green
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: calqulusrms
        version: green
    spec:
      containers:
      - name: calqulusrms
        image: calqulusrms:green
        imagePullPolicy: Always
        ports:
        - containerPort: 5173
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          value: "production"
        - name: VITE_SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: calqulusrms-secrets
              key: supabase-url
        - name: VITE_SUPABASE_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: calqulusrms-secrets
              key: supabase-publishable-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5173
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 5173
          initialDelaySeconds: 10
          periodSeconds: 5
