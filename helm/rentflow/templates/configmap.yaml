apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rentflow.fullname" . }}-config
  labels:
    {{- include "rentflow.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.NODE_ENV | quote }}
  LOG_LEVEL: {{ .Values.config.LOG_LEVEL | quote }}
  ENABLE_METRICS: {{ .Values.config.ENABLE_METRICS | quote }}
  ENABLE_TRACING: {{ .Values.config.ENABLE_TRACING | quote }}
  CACHE_TTL: {{ .Values.config.CACHE_TTL | quote }}
  SESSION_TIMEOUT: {{ .Values.config.SESSION_TIMEOUT | quote }}
