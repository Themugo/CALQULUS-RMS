apiVersion: v1
kind: Service
metadata:
  name: {{ include "calqulusrms.fullname" . }}
  labels:
    {{- include "calqulusrms.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 5173
    protocol: TCP
    name: http
  selector:
    {{- include "calqulusrms.selectorLabels" . | nindent 4 }}
