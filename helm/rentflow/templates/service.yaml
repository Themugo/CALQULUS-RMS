apiVersion: v1
kind: Service
metadata:
  name: {{ include "rentflow.fullname" . }}
  labels:
    {{- include "rentflow.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: 5173
    protocol: TCP
    name: http
  selector:
    {{- include "rentflow.selectorLabels" . | nindent 4 }}
